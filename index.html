<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Database Web App</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="styles\styles.css" rel="stylesheet">
    <link rel="manifest" href="/webmanifest.json" crossorigin="use-credentials"/>
  </head>
  <body>
    <div id="slideshow" class="normal" style="display: none">
      <div id="navBar"></div>
      <img id="mainImage" onclick="toggle_fullscreen()"></img>
    </div>
    <div id="startScreen">
      <form action="javascript:;" onsubmit=" update_query() ">
        <input type="search" id="query" name="query" placeholder="Enter tags"></input>
      </form>
      <div id="gallery">
      </div>
    </div>
  </body>
  <script src="scripts\main.js" async></script>
</html>
